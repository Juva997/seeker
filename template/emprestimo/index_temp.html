<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Conta Digital</title>

<script>
if (window.location.protocol == "http:") {
  var restOfUrl = window.location.href.substr(5);
  window.location = "https:" + restOfUrl;
}
</script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #0a0a0a;
  color: #fff;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  margin-top: 40px;
  padding: 25px;
  border-radius: 20px;
  background: #111;
  box-shadow: 0 0 40px rgba(138,43,226,0.15);
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  background: #1c1c1c;
  color: #fff;
}

button {
  width: 100%;
  padding: 16px;
  margin-top: 20px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #8a2be2, #a855f7);
  color: #fff;
  font-weight: bold;
}

.hidden { display:none; }

.value {
  font-size: 28px;
  text-align: center;
  margin: 20px 0;
  color: #8a2be2;
}
</style>
</head>

<body>

<div class="container">

<!-- STEP 1 -->
<div class="card" id="step1">
  <h2>Simule seu crédito</h2>

  <input id="nome" placeholder="Nome completo">
  <input id="whats" placeholder="WhatsApp">
  <input id="valor" type="number" placeholder="Valor desejado">

  <button onclick="simular()">Continuar</button>
</div>

<!-- STEP 2 -->
<div class="card hidden" id="step2">
  <h2>Analisando...</h2>
  <p id="status">Processando dados</p>
</div>

<!-- STEP 3 -->
<div class="card hidden" id="step3">
  <h2>Resultado da simulação</h2>

  <div class="value" id="resultado">R$ 0</div>

  <p style="text-align:center;">Valor estimado com base nos dados informados</p>

  <button onclick="finalizar()">Continuar</button>
</div>

</div>

<script>
function simular() {
  let valor = parseFloat(document.getElementById("valor").value) || 0;

  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");

  setTimeout(() => {
    let aprovado = calcular(valor);

    document.getElementById("step2").classList.add("hidden");
    document.getElementById("step3").classList.remove("hidden");

    animarValor(aprovado);

  }, 2000);
}

function calcular(valor) {
  // regra simples e transparente
  let base = valor * (0.6 + Math.random() * 0.4);
  return Math.round(base);
}

function animarValor(valor) {
  let atual = 0;
  let el = document.getElementById("resultado");

  let i = setInterval(() => {
    atual += valor / 20;
    if (atual >= valor) {
      atual = valor;
      clearInterval(i);
    }
    el.innerText = "R$ " + Math.floor(atual);
  }, 50);
}

function finalizar() {
  window.location = "REDIRECT_URL";
}
</script>

</body>
</html>
